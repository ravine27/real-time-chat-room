<!DOCTYPE html>
<html lang="en">

<head>

    <style>
        :root {
            --bg-color: #EAF4FF;
            --card-color: #FFFFFF;
            --chat-bg: #FFFFFF;
            --text-color: #222222;
            --accent-color: #64B5F6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            transition: all 0.4s ease;
            padding: 20px;
        }

        .chat-card {
            max-width: 800px;
            margin: auto;
            margin-top: 30px;
            background: var(--card-color);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
            transition: all 0.4s ease;
        }

        .chat-title {
            color: var(--accent-color);
            font-weight: 700;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.4s ease;
        }

        .theme-selector {
            text-align: center;
            margin-bottom: 20px;
        }

        .theme-btn {
            width: 45px;
            height: 45px;
            border: none;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
            font-size: 18px;
            background: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            transition: 0.3s;
        }

        .theme-btn:hover {
            transform: scale(1.15);
        }

        #darkModeBtn {
            width: 55px;
            font-size: 22px;
            border: 2px solid var(--accent-color);
        }

        #chat {
            height: 400px;
            overflow-y: auto;
            background: var(--chat-bg);
            border-radius: 18px;
            padding: 15px;
            border: 2px solid rgba(0, 0, 0, 0.05);
            scroll-behavior: smooth;
            transition: all 0.4s ease;
        }

        #chat::-webkit-scrollbar {
            width: 8px;
        }

        #chat::-webkit-scrollbar-thumb {
            background: #cfcfcf;
            border-radius: 10px;
        }

        .message {
            margin-bottom: 12px;
            animation: fadeIn .3s ease;
        }

        .message-bubble {
            display: inline-block;
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 75%;
            color: white;
            background: var(--accent-color);
            word-wrap: break-word;
            transition: all .4s ease;
        }

        .sender {
            background: var(--accent-color);
        }

        .form-control {
            background: var(--chat-bg) !important;
            color: var(--text-color) !important;
            border-radius: 14px !important;
            padding: 12px !important;
            border: 2px solid #e5e7eb !important;
            box-shadow: none !important;
            transition: all .4s ease;
        }

        .form-control::placeholder {
            color: #888;
        }

        .form-control:focus {
            border-color: var(--accent-color) !important;
        }

        .btn-send {
            border: none;
            border-radius: 14px;
            background: var(--accent-color);
            color: white;
            padding: 12px 24px;
            font-weight: 600;
            transition: all .3s ease;
        }

        .btn-send:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* DARK MODE */

        .dark-mode {
            --bg-color: #121212;
            --card-color: #1E1E1E;
            --chat-bg: #2A2A2A;
            --text-color: #FFFFFF;
        }

        .dark-mode .chat-card {
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.08);
        }

        .dark-mode #chat {
            background: var(--chat-bg);
            color: var(--text-color);
        }

        .dark-mode .form-control {
            background: #2A2A2A !important;
            color: white !important;
            border-color: #444 !important;
        }

        .dark-mode .form-control::placeholder {
            color: #bdbdbd !important;
        }

        .dark-mode .theme-btn {
            background: #2A2A2A;
            color: white;
        }

        .dark-mode #darkModeBtn {
            border-color: white;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
    <meta charset="UTF-8">
    <title>Real-Time Chat Application</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.1/stomp.min.js"></script>
</head>

<body>

    <div class="container">
        <div class="chat-card">

            <h1 class="chat-title">
                Chat Room
            </h1>

            <!-- Theme Controls -->
            <div class="theme-selector">

                <button class="theme-btn" onclick="changeTheme('red')" title="Red Theme">
                    🔴
                </button>

                <button class="theme-btn" onclick="changeTheme('blue')" title="Blue Theme">
                    🔵
                </button>

                <button class="theme-btn" onclick="changeTheme('yellow')" title="Yellow Theme">
                    🟡
                </button>

                <button class="theme-btn" onclick="changeTheme('green')" title="Green Theme">
                    🟢
                </button>

                <button class="theme-btn" onclick="changeTheme('purple')" title="Purple Theme">
                    🟣
                </button>

                <button class="theme-btn" onclick="changeTheme('pink')" title="Pink Theme">
                    🌸
                </button>

                <button class="theme-btn" onclick="changeTheme('brown')" title="Brown Theme">
                    🟤
                </button>

                <!-- Dark Mode Toggle -->
                <button id="darkModeBtn" class="theme-btn" onclick="toggleDarkMode()" title="Dark Mode">
                    🌙
                </button>

            </div>

            <!-- Chat Area -->
            <div id="chat"></div>

            <!-- Username -->
            <div class="mt-3">
                <input id="senderInput" type="text" class="form-control" placeholder="Enter your name">
            </div>

            <!-- Message Input -->
            <div class="input-group mt-3">

                <input id="messageInput" type="text" class="form-control" placeholder=" Type your message...">

                <button id="sendMessage" class="btn-send">
                    Send
                </button>

            </div>

        </div>
    </div>

</body>

<script>
    var stompClient = null;

    /* ---------------- CONNECTION ---------------- */

    function setConnected(connected) {
        document.getElementById('sendMessage').disabled = !connected;
    }

    function connect() {

        var socket = new SockJS(
            window.location.origin + "/chat"
        );

        stompClient = Stomp.over(socket);
        stompClient.debug = null; // Suppress debug logging

        stompClient.connect({}, function () {

            setConnected(true);

            stompClient.subscribe('/topic/messages', function (message) {

                showMessage(JSON.parse(message.body));

            });

        });
    }

    /* ---------------- SHOW MESSAGE ---------------- */

    function showMessage(message) {

        const chat = document.getElementById('chat');

        const messageElement = document.createElement('div');

        messageElement.className = 'message';

        messageElement.innerHTML = `
        <div class="message-bubble sender">
            <strong>${message.sender}</strong><br>
            ${message.content}
        </div>
    `;

        chat.appendChild(messageElement);

        chat.scrollTop = chat.scrollHeight;
    }

    /* ---------------- SEND MESSAGE ---------------- */

    function sentMessage() {

        const sender =
            document.getElementById('senderInput').value.trim();

        const content =
            document.getElementById('messageInput').value.trim();

        if (sender === '' || content === '') {
            return;
        }

        const chatMessage = {
            sender: sender,
            content: content
        };

        stompClient.send(
            "/app/sendMessage",
            {},
            JSON.stringify(chatMessage)
        );

        document.getElementById('messageInput').value = '';
    }

    /* ---------------- THEME SWITCHER ---------------- */

    function changeTheme(theme) {

        const themes = {

            red: {
                bg: "#FDECEC",
                card: "#FFF8F8",
                accent: "#E57373"
            },

            blue: {
                bg: "#EAF4FF",
                card: "#FFFFFF",
                accent: "#64B5F6"
            },

            yellow: {
                bg: "#FFFBEA",
                card: "#FFFDF5",
                accent: "#FFD54F"
            },

            green: {
                bg: "#ECFDF3",
                card: "#F7FFF9",
                accent: "#81C784"
            },

            purple: {
                bg: "#F3E8FF",
                card: "#FCFAFF",
                accent: "#BA68C8"
            },

            pink: {
                bg: "#FCE7F3",
                card: "#FFF8FB",
                accent: "#F48FB1"
            },

            brown: {
                bg: "#EFEBE9",
                card: "#FAF7F5",
                accent: "#A1887F"
            }

        };

        const selectedTheme = themes[theme];

        document.documentElement.style.setProperty(
            '--bg-color',
            selectedTheme.bg
        );

        document.documentElement.style.setProperty(
            '--card-color',
            selectedTheme.card
        );

        document.documentElement.style.setProperty(
            '--accent-color',
            selectedTheme.accent
        );

        localStorage.setItem("chatTheme", theme);
    }

    /* ---------------- DARK MODE ---------------- */

    function toggleDarkMode() {

        document.body.classList.toggle("dark-mode");

        const isDark =
            document.body.classList.contains("dark-mode");

        const btn =
            document.getElementById("darkModeBtn");

        btn.innerHTML = isDark ? "☀️" : "🌙";

        localStorage.setItem("darkMode", isDark);
    }

    /* ---------------- EVENTS ---------------- */

    document
        .getElementById('sendMessage')
        .addEventListener('click', sentMessage);

    document
        .getElementById('messageInput')
        .addEventListener('keypress', function (event) {

            if (event.key === 'Enter') {

                event.preventDefault();

                sentMessage();
            }
        });

    /* ---------------- PAGE LOAD ---------------- */

    window.onload = function () {

        const savedTheme =
            localStorage.getItem("chatTheme");

        if (savedTheme) {
            changeTheme(savedTheme);
        } else {
            changeTheme("blue");
        }

        const darkMode =
            localStorage.getItem("darkMode");

        if (darkMode === "true") {

            document.body.classList.add("dark-mode");

            document.getElementById("darkModeBtn")
                .innerHTML = "☀️";
        }

        connect();
    };
</script>

</html>
